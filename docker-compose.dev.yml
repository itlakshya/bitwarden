version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lakshya-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: lakshya_db
      POSTGRES_USER: lakshya_user
      POSTGRES_PASSWORD: lakshya_dev_password_2024
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - lakshya-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakshya_user -d lakshya_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


volumes:
  postgres_data:
    driver: local

networks:
  lakshya-network:
    driver: bridge